name: Pull Request

on:
  pull_request:
    branches: ["*"]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_DEFAULT_PLATFORM: linux/amd64
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    permissions:
      contents: read
      checks: write

  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      dockerfile-dev: ${{ steps.filter.outputs.dockerfile-dev }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dockerfile-dev:
              - 'docker/Dockerfile.dev'

  build-dev-image:
    name: Build and push dev image
    needs: [changes]
    if: |
      github.event.pull_request.head.repo.fork == false &&
      needs.changes.outputs.dockerfile-dev == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          file: docker/Dockerfile.dev
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-tests:
    name: Docker tests (same-repo)
    needs: [build-dev-image]
    if: |
      always() &&
      github.event.pull_request.head.repo.fork == false &&
      (needs.build-dev-image.result == 'success' || needs.build-dev-image.result == 'skipped')
    uses: ./.github/workflows/docker-tests.yml
    with:
      use-registry-image: false

  fork-approval:
    name: Approve fork PR for testing
    needs: [verify]
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    environment: fork-pr-approval
    steps:
      - run: echo "Approved for integration testing"

  docker-tests-fork:
    name: Docker tests (fork)
    needs: [fork-approval]
    if: |
      always() &&
      github.event.pull_request.head.repo.fork == true &&
      needs.fork-approval.result == 'success'
    uses: ./.github/workflows/docker-tests.yml
    with:
      use-registry-image: true
      image-repository: ${{ github.repository }}
