name: Docker Tests

on:
  workflow_call:
    inputs:
      use-registry-image:
        type: boolean
        default: false
        description: "Pull dev-latest from GHCR instead of building inline"
      image-repository:
        type: string
        default: ""
        description: "Full owner/repo string (required when use-registry-image: true)"

permissions:
  contents: read

env:
  DOCKER_DEFAULT_PLATFORM: linux/amd64
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  epicstests:
    name: Run all unit tests reliant on EPICS install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Create Build Reports Folder
        run: mkdir -p build/reports/tests
      - name: Set up Docker Buildx
        if: ${{ !inputs.use-registry-image }}
        uses: docker/setup-buildx-action@v3
      - name: Pull dev image from registry
        if: ${{ inputs.use-registry-image }}
        run: |
          docker pull ghcr.io/${{ inputs.image-repository }}:dev-latest
          docker tag ghcr.io/${{ inputs.image-repository }}:dev-latest epicsarchiver-test
      - name: Run tests with docker compose
        run: |
          docker compose -f docker/docker-compose.epicsTests.yml run \
            ${{ inputs.use-registry-image && '--no-build' || '' }} \
            epicsarchiver-test
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/epicsTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epicstests-build-reports
          path: build/reports/

  integrationtests:
    name: Run all unit tests reliant on web and possibly epics
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Create Build Reports Folder
        run: mkdir -p build/reports/tests
      - name: Set up Docker Buildx
        if: ${{ !inputs.use-registry-image }}
        uses: docker/setup-buildx-action@v3
      - name: Pull dev image from registry
        if: ${{ inputs.use-registry-image }}
        run: |
          docker pull ghcr.io/${{ inputs.image-repository }}:dev-latest
          docker tag ghcr.io/${{ inputs.image-repository }}:dev-latest epicsarchiver-test
      - name: Run tests with docker compose
        run: |
          docker compose -f docker/docker-compose.integrationTests.yml run \
            ${{ inputs.use-registry-image && '--no-build' || '' }} \
            epicsarchiver-test
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        with:
          report_paths: "**/build/test-results/integrationTests/TEST-*.xml"
          annotate_only: true
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrationtests-build-reports
          path: build/reports/
