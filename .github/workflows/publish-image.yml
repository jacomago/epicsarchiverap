name: Publish Image

on:
  workflow_call:
    inputs:
      nightly:
        type: boolean
        default: false
        description: "Use nightly tags instead of git-tag-based tags"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_DEFAULT_PLATFORM: linux/amd64

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        imagetag:
          - singletomcat
          - mgmt
          - etl
          - engine
          - retrieval
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build with Gradle
        run: ./gradlew buildRelease
        env:
          ARCHAPPL_SITEID: "default"
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract release metadata
        id: meta-release
        if: ${{ !inputs.nightly }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag,prefix=${{ matrix.imagetag }}-
      - name: Extract nightly metadata
        id: meta-nightly
        if: ${{ inputs.nightly }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.imagetag }}-nightly-latest
            type=schedule,pattern=${{ matrix.imagetag }}-nightly-%Y%m%d
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.imagetag }}
          tags: ${{ inputs.nightly && steps.meta-nightly.outputs.tags || steps.meta-release.outputs.tags }}
          labels: ${{ inputs.nightly && steps.meta-nightly.outputs.labels || steps.meta-release.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
